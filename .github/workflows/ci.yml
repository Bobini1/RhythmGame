name: Continuous Integration

on:
  workflow_dispatch:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache/binary
  VCPKG_DOWNLOADS: ${{ github.workspace }}/.vcpkg-cache/downloads
  VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/.vcpkg-cache/binary,readwrite;nugettimeout,300;nuget,https://nuget.pkg.github.com/Bobini1/index.json,readwrite'
  VCPKG_USE_NUGET_CACHE: 'true'
  VCPKG_MAX_CONCURRENCY: '2'
  ANDROID_HOME: ''
  ANDROID_NDK_HOME: ''
  ANDROID_NDK_LATEST_HOME: ''
  ANDROID_NDK_ROOT: ''
  ANDROID_SDK_ROOT: ''

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format
        run: |
          python3 -m venv "$RUNNER_TEMP/clang-format"
          "$RUNNER_TEMP/clang-format/bin/python" -m pip install clang-format==20.1.8
          echo "$RUNNER_TEMP/clang-format/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: cmake -P cmake/lint.cmake

  coverage:
    runs-on: ubuntu-latest

    if: github.repository_owner == 'Bobini1'

    steps:
      - uses: actions/checkout@v7

      - name: Prepare vcpkg cache folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "${{ github.workspace }}/.vcpkg-cache/binary", `
            "${{ github.workspace }}/.vcpkg-cache/downloads", `
            "${{ github.workspace }}/.vcpkg-buildtrees", `
            "${{ github.workspace }}/.vcpkg-packages" | Out-Null

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-
            vcpkg-${{ runner.os }}-${{ github.job }}-
            vcpkg-${{ runner.os }}-

      - name: Install LCov
        run: sudo apt-get update -q
          && sudo apt-get install lcov -q -y

      - name: Install system dependencies
        run: sudo apt-get install libtbb-dev libgl-dev libegl1-mesa-dev libdrm-dev libgles2-mesa-dev libudev-dev nasm autoconf automake autoconf-archive gperf pkg-config python3-jinja2 '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev libxrender-dev libxi-dev libwayland-dev wayland-protocols libxkbcommon-dev libxkbcommon-x11-dev libltdl-dev libxrandr-dev mono-complete -y

      - name: Free disk space
        run: bash .github/scripts/free-disk-space-ubuntu.sh

      - name: Export environment variables for vcpkg binary caching
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('VCPKG_ROOT', process.env.VCPKG_INSTALLATION_ROOT || '');
            core.exportVariable('VCPKG_EXE', process.env.VCPKG_INSTALLATION_ROOT + '/vcpkg' || '');
            core.exportVariable('NUGET_FEED_URL', 'https://nuget.pkg.github.com/Bobini1/index.json' || '');

      - name: Add NuGet sources
        shell: bash
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "Bobini1" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset=ci-coverage 2>&1 | tee configure.log

      - name: Report configure failure
        if: failure()
        shell: pwsh
        run: .github/scripts/report-configure-failure.ps1

      - name: Upload configure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: configure-logs-${{ github.job }}-${{ runner.os }}
          path: |
            configure.log
            build/**/CMakeFiles/CMakeConfigureLog.yaml
            build/**/CMakeFiles/CMakeError.log
            build/**/CMakeFiles/CMakeOutput.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build/coverage -j 2

      - name: Test
        working-directory: build/coverage
        env:
          RHYTHMGAME_AUDIO_BACKEND: Null
        run: |
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 -noreset > /dev/null 2>&1 &
          ctest --output-on-failure -j 2

      - name: Process coverage info
        run: cmake --build build/coverage -t coverage

      - name: Submit to codecov.io
        uses: codecov/codecov-action@v3
        with:
          files: build/coverage/coverage.info

  sanitize:
    needs: coverage
    if: ${{ always() && (needs.coverage.result == 'success' || needs.coverage.result == 'skipped') }}

    env:
      CXX: clang++
      CC: clang

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Prepare vcpkg cache folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "${{ github.workspace }}/.vcpkg-cache/binary", `
            "${{ github.workspace }}/.vcpkg-cache/downloads", `
            "${{ github.workspace }}/.vcpkg-buildtrees", `
            "${{ github.workspace }}/.vcpkg-packages" | Out-Null

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-
            vcpkg-${{ runner.os }}-${{ github.job }}-
            vcpkg-${{ runner.os }}-

      - name: Install system dependencies
        run: sudo apt-get install libtbb-dev libgl-dev libegl1-mesa-dev libdrm-dev libgles2-mesa-dev libudev-dev nasm autoconf automake autoconf-archive gperf pkg-config python3-jinja2 '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev libxrender-dev libxi-dev libwayland-dev wayland-protocols libxkbcommon-dev libxkbcommon-x11-dev libltdl-dev libxrandr-dev mono-complete -y

      - name: Free disk space
        run: bash .github/scripts/free-disk-space-ubuntu.sh

      - name: Export environment variables for vcpkg binary caching
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('VCPKG_ROOT', process.env.VCPKG_INSTALLATION_ROOT || '');
            core.exportVariable('VCPKG_EXE', process.env.VCPKG_INSTALLATION_ROOT + '/vcpkg' || '');
            core.exportVariable('NUGET_FEED_URL', 'https://nuget.pkg.github.com/Bobini1/index.json' || '');

      - name: Add NuGet sources
        shell: bash
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "Bobini1" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Install Clang 13
        run: sudo apt-get install clang libc++-dev -y

      - name: Configure
        run: |
          set -o pipefail
          cmake --preset=ci-sanitize 2>&1 | tee configure.log

      - name: Report configure failure
        if: failure()
        shell: pwsh
        run: .github/scripts/report-configure-failure.ps1

      - name: Upload configure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: configure-logs-${{ github.job }}-${{ runner.os }}
          path: |
            configure.log
            build/**/CMakeFiles/CMakeConfigureLog.yaml
            build/**/CMakeFiles/CMakeError.log
            build/**/CMakeFiles/CMakeOutput.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build/sanitize -j 2

      - name: Test
        working-directory: build/sanitize
        env:
          RHYTHMGAME_AUDIO_BACKEND: Null
          ASAN_OPTIONS: "strict_string_checks=1:\
          detect_stack_use_after_return=1:\
          check_initialization_order=1:\
          strict_init_order=1:\
          detect_leaks=1"
          UBSAN_OPTIONS: print_stacktrace=1
        run: |
          export DISPLAY=:99
          sudo Xvfb -ac :99 -screen 0 1280x1024x24 -noreset > /dev/null 2>&1 &
          ctest --output-on-failure -j 2

  test:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Prepare vcpkg cache folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "${{ github.workspace }}/.vcpkg-cache/binary", `
            "${{ github.workspace }}/.vcpkg-cache/downloads", `
            "${{ github.workspace }}/.vcpkg-buildtrees", `
            "${{ github.workspace }}/.vcpkg-packages" | Out-Null

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-
            vcpkg-${{ runner.os }}-${{ github.job }}-
            vcpkg-${{ runner.os }}-

      - name: Setup MultiToolTask
        if: matrix.os == 'windows-latest'
        run: |
          Add-Content "$env:GITHUB_ENV" 'UseMultiToolTask=true'
          Add-Content "$env:GITHUB_ENV" 'EnforceProcessCountAcrossBuilds=true'

      - name: Install WMF
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Install-WindowsFeature Server-Media-Foundation

      - name: Free disk space
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .github/scripts/free-disk-space-windows.ps1

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ ${{ matrix.os }} = ubuntu-latest ]; then
            sudo apt-get update && sudo apt-get install libtbb-dev libgl-dev libegl1-mesa-dev libdrm-dev libgles2-mesa-dev libudev-dev nasm autoconf automake autoconf-archive gperf pkg-config python3-jinja2 '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev libxrender-dev libxi-dev libwayland-dev wayland-protocols libxkbcommon-dev libxkbcommon-x11-dev libltdl-dev libxrandr-dev mono-complete -y
          else
            brew install autoconf automake autoconf-archive libtool nuget
          fi
          
      - name: Free disk space
        if: matrix.os == 'ubuntu-latest'
        run: bash .github/scripts/free-disk-space-ubuntu.sh

      - name: Set up Python for vcpkg
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python virtualenv for vcpkg
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check virtualenv
          $python = python -c "import sys; print(sys.executable)"
          Set-Content -Path .vcpkg-ci-python3 -Value $python -NoNewline
          Add-Content "$env:GITHUB_ENV" "VCPKG_PYTHON3=$python"

      - name: Export environment variables for vcpkg binary caching
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('VCPKG_ROOT', process.env.VCPKG_INSTALLATION_ROOT || '');
            core.exportVariable('VCPKG_EXE', process.env.VCPKG_INSTALLATION_ROOT + '/vcpkg' || '');
            core.exportVariable('NUGET_FEED_URL', 'https://nuget.pkg.github.com/Bobini1/index.json' || '');

      - name: Add NuGet sources
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "Bobini1" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"
          
      - name: Add NuGet sources
        shell: pwsh
        if: matrix.os == 'windows-latest'
        run: |
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
          sources add `
          -Source "${{ env.NUGET_FEED_URL }}" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "Bobini1" `
          -Password "${{ secrets.GITHUB_TOKEN }}"
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
          setapikey "${{ secrets.GITHUB_TOKEN }}" `
          -Source "${{ env.NUGET_FEED_URL }}"

      - name: Add NuGet sources for vcpkg binary caching
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          nuget sources add \
          -Source "${{ env.NUGET_FEED_URL }}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "Bobini1" \
          -Password "${{ secrets.GITHUB_TOKEN }}"
          nuget setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "${{ env.NUGET_FEED_URL }}"

      - name: Configure
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -o pipefail
          cmake --preset=ci-ubuntu 2>&1 | tee configure.log

      - name: Configure
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cmake --preset=ci-windows 2>&1 | Tee-Object -FilePath configure.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Report configure failure
        if: failure()
        shell: pwsh
        run: .github/scripts/report-configure-failure.ps1

      - name: Upload configure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: configure-logs-${{ github.job }}-${{ runner.os }}
          path: |
            configure.log
            build/**/CMakeFiles/CMakeConfigureLog.yaml
            build/**/CMakeFiles/CMakeError.log
            build/**/CMakeFiles/CMakeOutput.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Install
        shell: bash
        run: cmake --install build --config Release --prefix $PWD/prefix

      - name: Test
        working-directory: build
        shell: bash
        env:
          RHYTHMGAME_AUDIO_BACKEND: Null
        run: |
          if [ ${{ matrix.os }} = ubuntu-latest ]; then
            export DISPLAY=:99
            sudo Xvfb -ac :99 -screen 0 1280x1024x24 -noreset > /dev/null 2>&1 &
            ctest --output-on-failure -C Release -j 2
          else
            ctest --output-on-failure -C Release -j 2
          fi

  deploy:
    needs: test

    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Prepare vcpkg cache folders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "${{ github.workspace }}/.vcpkg-cache/binary", `
            "${{ github.workspace }}/.vcpkg-cache/downloads", `
            "${{ github.workspace }}/.vcpkg-buildtrees", `
            "${{ github.workspace }}/.vcpkg-packages" | Out-Null

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache/restore@v6
        with:
          path: .vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ github.job }}-${{ hashFiles('vcpkg.json', 'CMakePresets.json', 'vcpkgTriplets/**', 'vcpkgOverlayPorts*/**') }}-
            vcpkg-${{ runner.os }}-${{ github.job }}-
            vcpkg-${{ runner.os }}-

      - name: Install WMF
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Install-WindowsFeature Server-Media-Foundation

      - name: Free disk space
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: .github/scripts/free-disk-space-windows.ps1

      - name: Install system dependencies
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ ${{ matrix.os }} = ubuntu-latest ]; then
            sudo apt-get update && sudo apt-get install libtbb-dev libgl-dev libegl1-mesa-dev libdrm-dev libgles2-mesa-dev libudev-dev nasm autoconf automake autoconf-archive gperf pkg-config python3-jinja2 '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev libxrender-dev libxi-dev libwayland-dev wayland-protocols libxkbcommon-dev libxkbcommon-x11-dev libltdl-dev libxrandr-dev mono-complete -y
          else
            brew install autoconf automake autoconf-archive libtool nuget
          fi

      - name: Free disk space
        if: matrix.os == 'ubuntu-latest'
        run: bash .github/scripts/free-disk-space-ubuntu.sh

      - name: Set up Python for vcpkg
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python virtualenv for vcpkg
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check virtualenv
          $python = python -c "import sys; print(sys.executable)"
          Set-Content -Path .vcpkg-ci-python3 -Value $python -NoNewline
          Add-Content "$env:GITHUB_ENV" "VCPKG_PYTHON3=$python"

      - name: Export environment variables for vcpkg binary caching
        uses: actions/github-script@v9
        with:
          script: |
            core.exportVariable('VCPKG_ROOT', process.env.VCPKG_INSTALLATION_ROOT || '');
            core.exportVariable('VCPKG_EXE', process.env.VCPKG_INSTALLATION_ROOT + '/vcpkg' || '');
            core.exportVariable('NUGET_FEED_URL', 'https://nuget.pkg.github.com/Bobini1/index.json' || '');

      - name: Add NuGet sources
        shell: bash
        if: matrix.os == 'ubuntu-latest'
        run: |
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            sources add \
            -Source "${{ env.NUGET_FEED_URL }}" \
            -StorePasswordInClearText \
            -Name GitHubPackages \
            -UserName "Bobini1" \
            -Password "${{ secrets.GITHUB_TOKEN }}"
          mono `${{ env.VCPKG_EXE }} fetch nuget | tail -n 1` \
            setapikey "${{ secrets.GITHUB_TOKEN }}" \
            -Source "${{ env.NUGET_FEED_URL }}"

      - name: Add NuGet sources
        shell: pwsh
        if: matrix.os == 'windows-latest'
        run: |
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
          sources add `
          -Source "${{ env.NUGET_FEED_URL }}" `
          -StorePasswordInClearText `
          -Name GitHubPackages `
          -UserName "Bobini1" `
          -Password "${{ secrets.GITHUB_TOKEN }}"
          .$(${{ env.VCPKG_EXE }} fetch nuget) `
          setapikey "${{ secrets.GITHUB_TOKEN }}" `
          -Source "${{ env.NUGET_FEED_URL }}"

      - name: Add NuGet sources for vcpkg binary caching
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          nuget sources add \
          -Source "${{ env.NUGET_FEED_URL }}" \
          -StorePasswordInClearText \
          -Name GitHubPackages \
          -UserName "Bobini1" \
          -Password "${{ secrets.GITHUB_TOKEN }}"
          nuget setapikey "${{ secrets.GITHUB_TOKEN }}" \
          -Source "${{ env.NUGET_FEED_URL }}"

      - name: Configure
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -o pipefail
          cmake --preset=ci-ubuntu 2>&1 | tee configure.log

      - name: Configure
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cmake --preset=ci-windows 2>&1 | Tee-Object -FilePath configure.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Report configure failure
        if: failure()
        shell: pwsh
        run: .github/scripts/report-configure-failure.ps1

      - name: Upload configure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: configure-logs-${{ github.job }}-${{ runner.os }}
          path: |
            configure.log
            build/**/CMakeFiles/CMakeConfigureLog.yaml
            build/**/CMakeFiles/CMakeError.log
            build/**/CMakeFiles/CMakeOutput.log
            build/**/vcpkg-manifest-install.log
          if-no-files-found: ignore

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .vcpkg-cache
          key: ${{ steps.vcpkg-cache.outputs.cache-primary-key }}

      - name: Build
        run: cmake --build build --config Release -j 2

      - name: Package
        working-directory: build
        run: cpack -B artifacts --config CPackConfig.cmake

      - name: Remove CPack folders
        working-directory: build
        shell: bash
        run: rm -rf ./artifacts/_CPack_Packages

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}
          path: ${{ github.workspace }}/build/artifacts/
          if-no-files-found: error

  docs:
    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/master'
      && github.event_name == 'push'
      && github.repository_owner == 'Bobini1'

    steps:
      - uses: actions/checkout@v7

      - name: Install Doxygen and graphviz
        run: sudo apt-get update -q
          && sudo apt-get install doxygen graphviz -q -y

      - name: Build docs
        run: cmake "-DPROJECT_SOURCE_DIR=$PWD" "-DPROJECT_BINARY_DIR=$PWD/build"
          -P cmake/docs-ci.cmake

      - name: Deploy docs
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/docs/html
